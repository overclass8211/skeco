# =============================================================
# Capacitor Mobile Build — Android (debug APK) + iOS (archive 검증)
#
# 트리거:
#   - capacitor.config.json / android/ / ios/ / public/ 변경 시
#   - workflow_dispatch (수동 실행)
#
# 산출물:
#   - Android: app-debug.apk (artifact)
#   - iOS: archive 빌드 성공 여부만 검증 (서명 없이는 .ipa 불가)
#
# 사용자 환경:
#   - Apple Developer 계정이 secrets 에 설정되면 서명 빌드 가능
#   - 첫 POC 단계 — 빌드 자체가 통과하는지 확인 목표
# =============================================================
name: Capacitor Mobile Build

on:
  push:
    paths:
      - 'capacitor.config.json'
      - 'android/**'
      - 'ios/**'
      - 'public/**'
      - '.github/workflows/capacitor-build.yml'
  pull_request:
    paths:
      - 'capacitor.config.json'
      - 'android/**'
      - 'ios/**'
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Android — Ubuntu runner ────────────────────────────────
  android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 21 (Capacitor 8 requires)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Capacitor sync (copy web → android)
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oci-crm-ai-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ── iOS — macOS runner (validate-only without signing) ─────
  ios:
    name: Validate iOS Build (no signing)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Capacitor sync (copy web → ios)
        run: npx cap sync ios

      # Capacitor 8 은 iOS 의존성에 Swift Package Manager(CapApp-SPM) 사용 → CocoaPods/Podfile 없음.
      # 따라서 pod install 단계 제거, xcodebuild 는 -project(App.xcodeproj) 로 SPM 자동 해석.
      - name: Validate xcodebuild (no archive, no signing)
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | tee xcodebuild.log
        # 첫 POC: 빌드만 검증. 서명/배포는 secrets 추가 후 별도 workflow.

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcodebuild-log-${{ github.sha }}
          path: ios/App/xcodebuild.log
          retention-days: 7
