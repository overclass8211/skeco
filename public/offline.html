<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E63329">
  <title>오프라인 — OCI CRM AI</title>
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #fee 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1F2937;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(230, 51, 41, 0.08);
    }
    .icon { font-size: 64px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; color: #E63329; }
    p { font-size: 14px; color: #6B7280; line-height: 1.6; margin: 0 0 24px; }
    button {
      background: #E63329;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #c1271e; }
    .hint {
      margin-top: 18px;
      font-size: 11px;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>오프라인입니다</h1>
    <p>
      네트워크 연결이 끊어졌습니다.<br>
      Wi-Fi 또는 모바일 데이터를 확인해 주세요.
    </p>
    <button onclick="location.reload()">🔄 다시 시도</button>
    <div class="hint">OCI CRM AI · 오프라인 캐시 페이지</div>
  </div>
  <script>
    // 온라인 복귀 시 자동으로 메인 페이지로 이동
    window.addEventListener('online', () => location.replace('/'));
  </script>
</body>
</html>
