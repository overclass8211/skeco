<!-- Service Worker 등록 — 부팅 차단 안 함 (defer 후 load 이벤트) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.warn('[SW] 등록 실패:', err.message);
      });
    });
  }
</script>
