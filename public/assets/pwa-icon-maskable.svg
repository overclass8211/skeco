<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    v6.0.0 Maskable PWA Icon — 안드로이드 Adaptive Icon 가이드라인 준수
    버그 fix: 기존 <g transform="translate(51,51)"> + text x="50%" + 추가 translate(205,0)
              조합이 SVG 좌표계 이슈로 텍스트를 우측 외곽으로 밀어내 잘림 발생
    영구 fix:
      - safe-zone: 중앙 60% (viewBox 0.2~0.8, 폭 308px) — 마스크 후에도 보존
      - 단순 x=256 (viewBox 정중앙) + text-anchor=middle 사용 (transform 트릭 제거)
      - 폰트 크기 보수적: OCI 120px (텍스트 폭 ~240px) / CRM AI 38px (~180px)
  -->
  <rect width="512" height="512" fill="#E63329"/>
  <text x="256" y="232" font-family="Helvetica, Arial, 'Apple SD Gothic Neo', sans-serif"
        font-size="120" font-weight="700" fill="#ffffff"
        text-anchor="middle" dominant-baseline="central" letter-spacing="-2">OCI</text>
  <text x="256" y="332" font-family="Helvetica, Arial, 'Apple SD Gothic Neo', sans-serif"
        font-size="38" font-weight="500" fill="#ffffff" opacity="0.9"
        text-anchor="middle" dominant-baseline="central" letter-spacing="3">CRM AI</text>
</svg>
