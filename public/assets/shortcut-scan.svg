<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!--
    v6.0.0 PWA Shortcut Icon — 명함 촬영
    Android PWA shortcuts에서 표시 (long-press 아이콘)
    - 배경: OCI Red 원형
    - 전경: 흰색 카메라 실루엣 + 작은 명함 카드
  -->
  <rect width="96" height="96" rx="20" fill="#E63329"/>
  <!-- 카메라 본체 -->
  <rect x="20" y="32" width="56" height="40" rx="6" fill="#ffffff"/>
  <!-- 카메라 상단 돌출부 (셔터부) -->
  <rect x="38" y="26" width="20" height="8" rx="2" fill="#ffffff"/>
  <!-- 렌즈 외곽 -->
  <circle cx="48" cy="52" r="11" fill="#E63329"/>
  <!-- 렌즈 내부 -->
  <circle cx="48" cy="52" r="6" fill="#ffffff"/>
  <!-- 플래시 LED -->
  <circle cx="66" cy="40" r="2.5" fill="#E63329"/>
</svg>
