<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!--
    v6.0.0 PWA Shortcut Icon — 회의록 AI
    Android PWA shortcuts에서 표시 (long-press 아이콘)
    - 배경: OCI Red 라운드 사각형
    - 전경: 흰색 마이크 + AI 스파클
  -->
  <rect width="96" height="96" rx="20" fill="#E63329"/>
  <!-- 마이크 본체 (캡슐 모양) -->
  <rect x="38" y="22" width="20" height="38" rx="10" fill="#ffffff"/>
  <!-- 마이크 그릴 (음원) -->
  <line x1="44" y1="32" x2="52" y2="32" stroke="#E63329" stroke-width="1.5"/>
  <line x1="44" y1="40" x2="52" y2="40" stroke="#E63329" stroke-width="1.5"/>
  <line x1="44" y1="48" x2="52" y2="48" stroke="#E63329" stroke-width="1.5"/>
  <!-- 마이크 받침대 (U자 외곽) -->
  <path d="M 28 50 Q 28 68 48 68 Q 68 68 68 50"
        fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- 마이크 받침대 수직 봉 -->
  <line x1="48" y1="68" x2="48" y2="76" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- 마이크 받침대 가로 -->
  <line x1="40" y1="78" x2="56" y2="78" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- AI 스파클 (우상단) -->
  <circle cx="74" cy="22" r="3" fill="#ffffff"/>
  <circle cx="80" cy="30" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="70" cy="32" r="1.5" fill="#ffffff" opacity="0.5"/>
</svg>
